<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Pacific Vector</title>

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<link rel="shortcut icon" href="/assets/favicon.ico">

<!-- Open Graph / social previews -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Pacific Vector">
<meta property="og:title" content="Contact — Pacific Vector">
<meta property="og:description" content="Get in touch with Pacific Vector.">
<meta property="og:image" content="https://pacific-vector.com/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://pacific-vector.com/contact.html">

<!-- Twitter card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Contact — Pacific Vector">
<meta name="twitter:description" content="Get in touch with Pacific Vector.">
<meta name="twitter:image" content="https://pacific-vector.com/assets/og-image.png">

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --white:     #ffffff;
  --navy:      #1a3a5c;
  --navy-lt:   #e8f0f8;
  --ink:       #0d0d0d;
  --mid:       #888888;
  --rule:      #e5e5e5;
  --bg:        #f8f8f6;
  --font:      'IBM Plex Mono', monospace;
  --max-width: 740px;
  --pad:       2rem;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  font-weight: 300;
  font-size: 13px;
  line-height: 1.75;
}

a { color: inherit; text-decoration: none; }

.wrap {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 var(--pad);
}

header {
  padding: 3rem 0 2rem;
  border-bottom: 1px solid var(--ink);
  margin-bottom: 2.5rem;
}

.logo { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; }
.logo-accent { color: var(--navy); }

.header-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 0.5rem;
  font-size: 0.7rem;
  color: var(--mid);
  letter-spacing: 0.08em;
}

nav a {
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--mid);
  margin-left: 1.5rem;
  text-transform: uppercase;
  transition: color 0.15s;
}

nav a:hover { color: var(--navy); }
nav a.active { color: var(--navy); border-bottom: 1px solid var(--navy); }

.page-title {
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--navy);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 0.5rem;
  margin-bottom: 2rem;
}

.lede {
  margin-bottom: 3rem;
  padding-left: 1rem;
  border-left: 2px solid var(--navy);
  font-size: 0.85rem;
  line-height: 1.8;
}

.section { margin-bottom: 3rem; }

.section-header {
  margin-bottom: 1.5rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--rule);
}

.section-label {
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--navy);
}

.section p {
  font-size: 0.8rem;
  line-height: 1.8;
  margin-bottom: 1rem;
  color: #333;
}

.section p:last-child { margin-bottom: 0; }

/* ── FORM ── */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  max-width: 480px;
}

.form-row label {
  display: block;
  font-size: 0.62rem;
  font-weight: 500;
  color: var(--mid);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}

.form-row input,
.form-row textarea {
  width: 100%;
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 300;
  background: var(--white);
  border: 1px solid var(--rule);
  color: var(--ink);
  padding: 0.6rem 0.8rem;
  outline: none;
  transition: border-color 0.15s;
}

.form-row input:focus,
.form-row textarea:focus { border-color: var(--navy); }

.form-row textarea { resize: vertical; min-height: 120px; }

.contact-form button {
  font-family: var(--font);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--navy);
  color: var(--white);
  border: none;
  padding: 0.7rem 1.4rem;
  cursor: pointer;
  transition: opacity 0.15s;
  align-self: flex-start;
}

.contact-form button:hover { opacity: 0.85; }
.contact-form button:disabled { opacity: 0.5; cursor: default; }

.form-msg {
  font-size: 0.72rem;
  display: none;
}

.form-msg.success { color: #2a7a4f; display: block; }
.form-msg.error   { color: #c0392b; display: block; }

footer {
  margin-top: 4rem;
  padding: 1.5rem 0 3rem;
  border-top: 1px solid var(--rule);
  font-size: 0.65rem;
  color: var(--mid);
  letter-spacing: 0.08em;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.footer-links a {
  color: var(--mid);
  margin-left: 1rem;
  letter-spacing: 0.08em;
  transition: color 0.15s;
}

.footer-links a:hover { color: var(--navy); }

@media (max-width: 600px) {
  .header-meta { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">PACIFIC<span class="logo-accent">VECTOR</span></div>
    <div class="header-meta">
      <span>Japan Geopolitical Intelligence</span>
      <nav>
        <a href="index.html">Today</a>
        <a href="archive.html">Archive</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <div class="page-title">— Contact</div>

  <div class="lede">
    Questions, feedback, corrections, or interest in working together — get in touch below.
  </div>

  <section class="section">
    <div class="section-header">
      <span class="section-label">— send a message</span>
    </div>

    <form class="contact-form" id="contact-form">
      <div class="form-row">
        <label for="contact-name">Name</label>
        <input type="text" id="contact-name" name="name" autocomplete="name" required>
      </div>
      <div class="form-row">
        <label for="contact-email">Email</label>
        <input type="email" id="contact-email" name="email" autocomplete="email" required>
      </div>
      <div class="form-row">
        <label for="contact-message">Message</label>
        <textarea id="contact-message" name="message" required></textarea>
      </div>
      <button type="submit" id="contact-submit">Send →</button>
      <div class="form-msg" id="contact-msg"></div>
    </form>
  </section>

  <footer>
    <span>PACIFIC VECTOR — Japan Geopolitical Intelligence</span>
    <span class="footer-links">
      <a href="about.html">About</a>
      <a href="archive.html">Archive</a>
      <a href="contact.html">Contact</a>
      <a href="index.html#subscribe">Subscribe</a>
    </span>
  </footer>
</div>

<script>
document.getElementById('contact-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const name    = document.getElementById('contact-name').value.trim();
  const email   = document.getElementById('contact-email').value.trim();
  const message = document.getElementById('contact-message').value.trim();
  const msg     = document.getElementById('contact-msg');
  const btn     = document.getElementById('contact-submit');

  if (!name || !email || !message) {
    msg.className = 'form-msg error';
    msg.textContent = 'Please fill in all fields.';
    return;
  }

  btn.textContent = 'Sending...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, message })
    });
    const data = await res.json();
    if (res.ok) {
      msg.className = 'form-msg success';
      msg.textContent = '✓ Message sent. We\'ll get back to you soon.';
      document.getElementById('contact-form').reset();
      btn.textContent = 'Sent ✓';
    } else {
      throw new Error(data.error || 'Failed to send');
    }
  } catch (err) {
    msg.className = 'form-msg error';
    msg.textContent = 'Something went wrong. Please try again, or email us directly.';
    btn.textContent = 'Send →';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
