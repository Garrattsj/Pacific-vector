<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --white:     #ffffff;
  --navy:      #1a3a5c;
  --navy-lt:   #e8f0f8;
  --ink:       #0d0d0d;
  --mid:       #888888;
  --rule:      #e5e5e5;
  --bg:        #f8f8f6;
  --font:      'IBM Plex Mono', monospace;
  --max-width: 740px;
  --pad:       2rem;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  font-weight: 300;
  font-size: 13px;
  line-height: 1.75;
}

a { color: inherit; text-decoration: none; }

.wrap {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 var(--pad);
}

header {
  padding: 3rem 0 2rem;
  border-bottom: 1px solid var(--ink);
  margin-bottom: 2.5rem;
}

.logo { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; }
.logo-accent { color: var(--navy); }

.header-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 0.5rem;
  font-size: 0.7rem;
  color: var(--mid);
  letter-spacing: 0.08em;
}

nav a {
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--mid);
  margin-left: 1.5rem;
  text-transform: uppercase;
  transition: color 0.15s;
}

nav a:hover { color: var(--navy); }
nav a.active { color: var(--navy); border-bottom: 1px solid var(--navy); }

.page-title {
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--navy);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 0.5rem;
  margin-bottom: 2rem;
}

.archive-list { list-style: none; }

.archive-item {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 0.8rem 0;
  border-bottom: 1px solid var(--rule);
  gap: 1rem;
}

.archive-item:hover { background: var(--navy-lt); margin: 0 -1rem; padding: 0.8rem 1rem; }

.archive-date {
  font-size: 0.72rem;
  color: var(--mid);
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.archive-lede {
  font-size: 0.78rem;
  line-height: 1.5;
  flex: 1;
}

.archive-link {
  font-size: 0.68rem;
  color: var(--navy);
  white-space: nowrap;
}

.loading {
  text-align: center;
  padding: 4rem 0;
  color: var(--mid);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
}

footer {
  margin-top: 4rem;
  padding: 1.5rem 0 3rem;
  border-top: 1px solid var(--rule);
  font-size: 0.65rem;
  color: var(--mid);
  letter-spacing: 0.08em;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.footer-links a {
  color: var(--mid);
  margin-left: 1rem;
  letter-spacing: 0.08em;
  transition: color 0.15s;
}

.footer-links a:hover { color: var(--navy); }

@media (max-width: 600px) {
  .archive-item { flex-direction: column; gap: 0.3rem; }
  .header-meta { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
  nav { display: flex; flex-wrap: wrap; gap: 0.6rem 1rem; margin-top: 0.3rem; }
  nav a { margin-left: 0; }
}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">PACIFIC<span class="logo-accent">VECTOR</span></div>
    <div class="header-meta">
      <span>Japan Geopolitical Intelligence</span>
      <nav>
        <a href="index.html">Today</a>
        <a href="archive.html" class="active">Archive</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <div class="page-title">— Archive</div>

  <div class="loading" id="loading">Loading archive...</div>

  <ul class="archive-list" id="archive-list"></ul>

  <footer>
    <span>PACIFIC VECTOR — Japan Geopolitical Intelligence</span>
    <span class="footer-links">
      <a href="about.html">About</a>
      <a href="archive.html">Archive</a>
      <a href="contact.html">Contact</a>
      <a href="index.html#subscribe">Subscribe</a>
    </span>
  </footer>
</div>

<script>
async function loadArchive() {
  try {
    const res = await fetch('/api/archive');
    if (!res.ok) throw new Error('Failed');
    const briefs = await res.json();
    renderArchive(briefs);
  } catch (e) {
    document.getElementById('loading').textContent = 'No archive available yet.';
  }
}

function renderArchive(briefs) {
  document.getElementById('loading').style.display = 'none';
  const list = document.getElementById('archive-list');

  if (!briefs.length) {
    list.innerHTML = '<li style="color:var(--mid);font-size:0.78rem;padding:2rem 0;">No briefs archived yet.</li>';
    return;
  }

  list.innerHTML = briefs.map(b => `
    <li class="archive-item">
      <span class="archive-date">${b.date}</span>
      <span class="archive-lede">${b.opening_line || ''}</span>
      <a class="archive-link" href="/brief/${b.slug}">Read →</a>
    </li>
  `).join('');
}

loadArchive();
</script>
</body>
</html>
