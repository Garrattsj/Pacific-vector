name: Pacific Vector — Daily Brief

on:
  schedule:
    # 7am Tokyo time = 22:00 UTC (Tokyo is UTC+9)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Pacific Vector brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 pacific_vector.py

      - name: Copy brief to website folder
        run: |
          mkdir -p briefs
          DATE=$(date +%Y-%m-%d)
          if [ -f "output/pacific_vector_${DATE}.json" ]; then
            cp "output/pacific_vector_${DATE}.json" "briefs/pacific_vector_${DATE}.json"
            echo "Brief copied successfully"
          else
            echo "No brief file found for today"
            ls output/ || echo "Output folder empty"
          fi

      - name: Commit and push brief
        run: |
          git config --global user.email "brief@pacific-vector.com"
          git config --global user.name "Pacific Vector Bot"
          git add briefs/
          git diff --staged --quiet || git commit -m "Daily brief $(date +%Y-%m-%d)"
          git push
