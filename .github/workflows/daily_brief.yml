name: Pacific Vector — Daily Brief

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Pacific Vector brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 pacific_vector.py

      - name: Copy brief to briefs folder
        run: |
          mkdir -p briefs
          # Use JST date to match the date written into the brief itself
          # (the workflow runs at 22:00 UTC = 07:00 JST the next day)
          DATE=$(TZ='Asia/Tokyo' date +%Y-%m-%d)
          # Look in output/ folder where the script saves files
          if [ -f "output/pacific_vector_${DATE}.json" ]; then
            cp "output/pacific_vector_${DATE}.json" "briefs/pacific_vector_${DATE}.json"
            echo "✓ Brief copied: pacific_vector_${DATE}.json"
          else
            echo "Files in output/:"
            ls output/ 2>/dev/null || echo "output/ folder is empty or missing"
            # Try to find any JSON file generated today
            FOUND=$(find output/ -name "*.json" -newer /tmp 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              cp "$FOUND" "briefs/pacific_vector_${DATE}.json"
              echo "✓ Brief copied from: $FOUND"
            else
              echo "❌ No brief file found to copy"
              exit 1
            fi
          fi

      - name: Commit and push brief
        run: |
          git config --global user.email "brief@pacific-vector.com"
          git config --global user.name "Pacific Vector Bot"
          git add briefs/
          git diff --staged --quiet || git commit -m "Daily brief $(date +%Y-%m-%d)"
          git push
