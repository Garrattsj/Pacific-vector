name: Pacific Vector — Weekly Stats

on:
  schedule:
    # 23:00 UTC Sunday = 08:00 JST Monday
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  weekly-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Generate and send weekly stats
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: python3 weekly_stats.py
